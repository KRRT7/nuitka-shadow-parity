name: CPython tests with Nuitka

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Nuitka test search mode"
        required: true
        default: "only"
        type: choice
        options:
          - only
          - search
          - all
      pattern:
        description: "Test pattern, e.g. test_dict.py"
        required: false
        default: "test_list.py"
      python-version:
        description: "CPython version to run, or all supported versions"
        required: true
        default: "all"
        type: choice
        options:
          - "all"
          - "3.8"
          - "3.9"
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"

jobs:
  cpython:
    name: CPython ${{ matrix.python-version }}
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(inputs.python-version == 'all' && '["3.8","3.9","3.10","3.11","3.12","3.13","3.14"]' || format('["{0}"]', inputs.python-version)) }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Keep Node available for act post steps
        if: ${{ env.ACT == 'true' }}
        run: |
          apt-get update
          apt-get install -y nodejs
          node_path="$(command -v node || find / -type f -name node -perm -111 2>/dev/null | head -n 1)"
          if [ -n "$node_path" ]; then
            ln -sf "$node_path" "${pythonLocation}/bin/node"
            ln -sf "$node_path" /usr/bin/node
          fi

      - name: Install system tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache

      - name: Select CPython test suite branch
        env:
          PYTHON_VERSION: ${{ matrix.python-version }}
        run: |
          if [ "$PYTHON_VERSION" = "3.12" ] || [ "$PYTHON_VERSION" = "3.13" ] || [ "$PYTHON_VERSION" = "3.14" ]; then
            git -C Nuitka-CPython-tests fetch origin CPython312
            git -C Nuitka-CPython-tests checkout --detach FETCH_HEAD
          else
            test_branch="CPython${PYTHON_VERSION//./}"
            git -C Nuitka-CPython-tests fetch origin "$test_branch"
            git -C Nuitka-CPython-tests checkout --detach FETCH_HEAD
          fi

      - name: Install matching CPython test sources
        if: ${{ matrix.python-version == '3.13' || matrix.python-version == '3.14' }}
        working-directory: Nuitka-CPython-tests
        env:
          PYTHONPATH: ${{ github.workspace }}/Nuitka
        run: |
          cpython_tag="$(python -c 'import sys; v = sys.version_info; print(f"v{v.major}.{v.minor}.{v.micro}")')"

          archive="/tmp/cpython-${cpython_tag}.tar.gz"
          extract_dir="/tmp/cpython-test-${cpython_tag}"

          rm -rf "$archive" "$extract_dir"
          mkdir -p "$extract_dir"

          curl -fsSL "https://github.com/python/cpython/archive/refs/tags/${cpython_tag}.tar.gz" -o "$archive"
          tar -xzf "$archive" -C "$extract_dir" --strip-components=2 "cpython-${cpython_tag#v}/Lib/test"

          rm -rf test doctest_generated
          mv "$extract_dir/test" test
          if [ -d test/decimaltestdata ]; then
            rm -rf decimaltestdata
            mv test/decimaltestdata decimaltestdata
          fi

          if ! python update_doctest_generated.py; then
            echo "::warning::Doctest generation is not compatible with ${cpython_tag}; continuing with official Lib/test sources."
            rm -rf doctest_generated
            mkdir doctest_generated
          fi

          python - <<'PY'
          from pathlib import Path

          filename = Path("run_all.py")
          source = filename.read_text()
          old = (
              '    if filename == "test_interpreters.py":\n'
              '        reportSkip("No subinterpreter support", dirname, filename)\n'
              '        return\n'
          )
          new = (
              '    if filename in (\n'
              '        "test_interpreters.py",\n'
              '        "test__interpchannels.py",\n'
              '        "test__interpreters.py",\n'
              '        "test_crossinterp.py",\n'
              '    ):\n'
              '        reportSkip("No subinterpreter support", dirname, filename)\n'
              '        return\n'
          )
          if old not in source:
              raise SystemExit("Could not patch subinterpreter skip list")

          filename.write_text(source.replace(old, new))
          PY

      - name: Show revisions
        env:
          PYTHONPATH: ${{ github.workspace }}/Nuitka
          NUITKA_TEST_INSTALLED: "1"
        run: |
          git submodule status
          git -C Nuitka-CPython-tests branch --show-current || true
          git -C Nuitka-CPython-tests rev-parse --short HEAD
          python --version
          python -m nuitka --version

      - name: Run CPython test subset
        working-directory: Nuitka-CPython-tests
        env:
          PYTHONPATH: ${{ github.workspace }}/Nuitka
          NUITKA_TEST_INSTALLED: "1"
          CCACHE_DIR: ${{ github.workspace }}/.ccache
        run: |
          python run_all.py "${{ inputs.mode }}" "${{ inputs.pattern }}"
